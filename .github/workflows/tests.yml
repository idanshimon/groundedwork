name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: cd python && pip install -e ".[dev]"
      - name: Test
        run: cd python && python -m pytest -q

  typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: cd ts && npm ci
      - name: Build
        run: cd ts && npm run build
      - name: Test
        run: cd ts && npm test

  parity:
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install python package
        run: cd python && pip install -e .
      - name: Install TS deps (for the emitter)
        run: cd ts && npm ci
      - name: Cross-language parity check
        run: python bench/parity.py
